appId: com.toolbox-portal.app
productName: ToolBox Portal
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
